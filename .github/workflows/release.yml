name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:12.6.0-devel-ubuntu22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: deps
        run: apt-get update && apt-get install -y cmake build-essential dpkg-dev
      - name: sync VERSION file
        run: echo "${{ github.ref_name }}" | sed 's/^v//' > VERSION
      - name: build deb
        run: bash ./scripts/build-deb.sh
      - name: upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: cudackpt-deb
          path: build/cudackpt_*.deb

  gpu-gate:
    if: false # enable when a self-hosted GPU runner is registered
    runs-on: self-hosted
    needs: build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: sync VERSION file
        run: echo "${{ github.ref_name }}" | sed 's/^v//' > VERSION
      - name: env
        run: ./scripts/check_env.sh
      - name: build
        run: make
      - name: e2e-fast
        run: sudo -E ./scripts/run_e2e_fast.sh

  publish:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: download deb
        uses: actions/download-artifact@v4
        with:
          name: cudackpt-deb
          path: dist
      - name: create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VER="${TAG#v}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/cudackpt_"${VER}"_amd64.deb --clobber
          else
            gh release create "$TAG" \
              --title "cudackpt ${VER}" \
              --notes-file .github/release-notes/${TAG}.md \
              dist/cudackpt_"${VER}"_amd64.deb
          fi
