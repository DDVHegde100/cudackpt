name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: deps
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential dpkg-dev
      - name: sync VERSION file
        run: echo "${{ github.ref_name }}" | sed 's/^v//' > VERSION
      - name: build deb
        run: bash ./scripts/build-deb.sh
      - name: upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: cudackpt-deb
          path: build/cudackpt_*.deb

  gpu-gate:
    runs-on: self-hosted
    needs: build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: sync VERSION file
        run: echo "${{ github.ref_name }}" | sed 's/^v//' > VERSION
      - name: env
        run: ./scripts/check_env.sh
      - name: build
        run: make
      - name: e2e-fast
        run: sudo -E ./scripts/run_e2e_fast.sh

  publish:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: download deb
        uses: actions/download-artifact@v4
        with:
          name: cudackpt-deb
          path: dist
      - name: create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VER="${TAG#v}"
          NOTES="$(cat <<EOF
          ## cudackpt ${VER}

          First public release — checkpoint and restore single-GPU CUDA processes on Linux using an LD_PRELOAD shim and CRIU.

          ### Install

          \`\`\`bash
          sudo dpkg -i cudackpt_${VER}_amd64.deb
          \`\`\`

          Or build from source: \`git clone\` → \`make\` → \`sudo make install\`

          ### Highlights

          - CUDA Driver API interception without app changes
          - Versioned GPU images with CRC32C, compression, sparse/dedup/delta options
          - Full CLI: checkpoint, restore, rollback, inspect, metrics agent
          - Prometheus metrics, RPC auth, systemd units

          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${TAG}/CHANGELOG.md) for full notes.

          > GPU e2e on a self-hosted runner is recommended before production use. The \`gpu-gate\` job runs when a self-hosted runner is available.
          EOF
          )"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/cudackpt_"${VER}"_amd64.deb --clobber
          else
            gh release create "$TAG" \
              --title "cudackpt ${VER}" \
              --notes "$NOTES" \
              dist/cudackpt_"${VER}"_amd64.deb
          fi
